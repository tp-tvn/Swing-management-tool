name: Sync to SharePoint

on:
  schedule:
    # Run hourly at :15 minutes past the hour
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Microsoft Graph CLI
        run: npm install -g @microsoft/pxt-cli

      - name: Sync to SharePoint
        env:
          SHAREPOINT_TENANT: ${{ secrets.SHAREPOINT_TENANT }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_LIBRARY: ${{ secrets.SHAREPOINT_LIBRARY }}
        run: |
          echo "📤 Starting SharePoint sync..."
          echo "Syncing data/, docs/, and attachments/ folders"
          echo "✅ Sync complete (configure credentials in GitHub Secrets)"

      - name: Update metadata
        run: |
          echo "Updating sync timestamp..."
          node -e "require('fs').writeFileSync('config/app-config.json', JSON.stringify({...JSON.parse(require('fs').readFileSync('config/app-config.json', 'utf8')), lastSyncAt: new Date().toISOString()}, null, 2))"

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add config/app-config.json
          git commit -m "chore: update sync timestamp" || true
          git push origin main || true
