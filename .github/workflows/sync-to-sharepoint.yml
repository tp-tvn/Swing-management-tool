name: Sync to SharePoint

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to SharePoint
        env:
          SHAREPOINT_TENANT: ${{ secrets.SHAREPOINT_TENANT }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_LIBRARY: ${{ secrets.SHAREPOINT_LIBRARY }}
        run: |
          python3 << 'EOF'
          import os, sys, glob, requests

          tenant        = os.environ['SHAREPOINT_TENANT']
          client_id     = os.environ['SHAREPOINT_CLIENT_ID']
          client_secret = os.environ['SHAREPOINT_CLIENT_SECRET']
          site_path     = os.environ['SHAREPOINT_SITE']      # e.g. contoso.sharepoint.com:/sites/MySite
          library       = os.environ.get('SHAREPOINT_LIBRARY', 'Documents')

          # 1. Get access token
          token_resp = requests.post(
              f"https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token",
              data={
                  'grant_type':    'client_credentials',
                  'client_id':     client_id,
                  'client_secret': client_secret,
                  'scope':         'https://graph.microsoft.com/.default',
              }
          )
          token_resp.raise_for_status()
          headers = {'Authorization': f"Bearer {token_resp.json()['access_token']}"}

          # 2. Get site ID
          site_resp = requests.get(
              f"https://graph.microsoft.com/v1.0/sites/{site_path}",
              headers=headers
          )
          site_resp.raise_for_status()
          site_id = site_resp.json()['id']

          # 3. Resolve document library drive
          drives_resp = requests.get(
              f"https://graph.microsoft.com/v1.0/sites/{site_id}/drives",
              headers=headers
          )
          drives_resp.raise_for_status()
          drives = drives_resp.json()['value']
          drive = next((d for d in drives if d['name'] == library), drives[0])
          drive_id = drive['id']

          # 4. Collect JSON and PDF files to sync
          files_to_sync = sorted(set(
              glob.glob('config/*.json') +
              glob.glob('data/*.json') +
              glob.glob('docs/*.pdf') +
              glob.glob('attachments/*.pdf') +
              glob.glob('**/*.pdf', recursive=True)
          ))

          if not files_to_sync:
              print("No files matched for sync.")
              sys.exit(0)

          # Target folder in SharePoint
          sp_folder = "General/07 - Geology/14.  Scripts/6. GitHub Repo Clone"

          uploaded, failed = [], []
          for filepath in files_to_sync:
              remote_path = f"{sp_folder}/{filepath}"
              upload_url = f"https://graph.microsoft.com/v1.0/drives/{drive_id}/root:/{remote_path}:/content"
              with open(filepath, 'rb') as f:
                  resp = requests.put(
                      upload_url,
                      headers={**headers, 'Content-Type': 'application/octet-stream'},
                      data=f.read()
                  )
              if resp.status_code in (200, 201):
                  uploaded.append(filepath)
                  print(f"  uploaded: {filepath}")
              else:
                  failed.append(filepath)
                  print(f"  FAILED:   {filepath} ({resp.status_code}: {resp.text[:120]})")

          print(f"\nDone: {len(uploaded)} uploaded, {len(failed)} failed.")
          if failed:
              sys.exit(1)
          EOF

      - name: Update sync timestamp
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('config/app-config.json', 'utf8'));
            cfg.lastSyncAt = new Date().toISOString();
            fs.writeFileSync('config/app-config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add config/app-config.json
          git commit -m "chore: update sync timestamp" || true
          git push origin main || true
